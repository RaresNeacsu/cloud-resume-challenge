name: Deploy Frontend

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::132249065332:role/GitHubAction-S3-CloudFront
          aws-region: eu-central-1

      - name: Deploy to S3
        run: aws s3 sync . s3://rares-neacsu-resume-2026 --delete --exclude ".git*"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E1ZJQM9Y8QU1F2 --paths "/*"
